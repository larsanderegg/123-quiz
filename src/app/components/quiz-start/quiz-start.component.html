<div *ngIf="!showRounds" class="splash-container">
  <button mat-flat-button (click)="onStart()">Start</button>
</div>

<div *ngIf="showRounds" class="start-page-container">
  <div *ngIf="isLoading" class="loading-indicator">
    <mat-spinner diameter="50"></mat-spinner>
    <p>Loading available rounds...</p>
  </div>

  <div *ngIf="!isLoading && rounds.length === 0" class="empty-state">
    <p>No rounds available to start.</p>
    <p>Please create some rounds first.</p>
    <button mat-stroked-button routerLink="/rounds">Manage Rounds</button>
  </div>

  <div *ngIf="!isLoading && rounds.length > 0" class="rounds-selection-container">
    <div class="pyramid">
      <div class="tier tier-finale" *ngIf="groupedRounds.finale.length > 0">
        <mat-card *ngFor="let round of groupedRounds.finale"
                  class="round-card-vertical" (click)="startRound(round.id)"
                  tabindex="0" aria-role="button" [attr.aria-label]="'Start round ' + round.name">
          <mat-card-content class="round-card-content">
            <span class="round-name">{{ round.name }}</span>
          </mat-card-content>
        </mat-card>
      </div>

      <div class="tier tier-half-finale" *ngIf="groupedRounds.halfFinale.length > 0">
        <mat-card *ngFor="let round of groupedRounds.halfFinale"
                  class="round-card-vertical" (click)="startRound(round.id)"
                  tabindex="0" aria-role="button" [attr.aria-label]="'Start round ' + round.name">
          <mat-card-content class="round-card-content">
            <span class="round-name">{{ round.name }}</span>
          </mat-card-content>
        </mat-card>
      </div>

      <div class="tier tier-group" *ngIf="groupedRounds.group.length > 0">
        <mat-card *ngFor="let round of groupedRounds.group"
                  class="round-card-vertical" (click)="startRound(round.id)"
                  tabindex="0" aria-role="button" [attr.aria-label]="'Start round ' + round.name">
          <mat-card-content class="round-card-content">
            <span class="round-name">{{ round.name }}</span>
          </mat-card-content>
        </mat-card>
      </div>
    </div>
  </div>
</div>
